<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; }
  body {
    background: #0a0a0a;
    font-family: "Segoe UI", Arial, sans-serif;
    color: #f5f5f5;
    position: relative;
    overflow: hidden;
  }
  .glow {
    position: absolute; top: -160px; left: -120px;
    width: 620px; height: 620px;
    background: radial-gradient(circle, rgba(206,255,0,0.18), transparent 65%);
  }
  .wrap {
    position: relative;
    padding: 70px 80px;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .top { display: flex; align-items: center; gap: 18px; margin-bottom: 26px; }
  .mark {
    width: 66px; height: 66px; border: 4px solid #f5f5f5; border-radius: 16px;
    position: relative; flex: 0 0 auto;
  }
  .mark:before {
    content: ""; position: absolute; left: 22px; top: 17px;
    border-left: 26px solid #ceff00;
    border-top: 16px solid transparent; border-bottom: 16px solid transparent;
  }
  .mark:after {
    content: ""; position: absolute; right: -8px; top: -8px;
    width: 16px; height: 16px; border-radius: 50%; background: #ceff00;
  }
  .brand { font-size: 40px; font-weight: 900; letter-spacing: -1px; text-transform: uppercase; }
  .brand span { color: #ceff00; }
  h1 {
    font-size: 92px; font-weight: 900; line-height: 0.95;
    letter-spacing: -3px; text-transform: uppercase;
  }
  h1 .a { color: #ceff00; }
  .sub {
    margin-top: 26px; font-size: 30px; font-weight: 600; color: #b9c0c7;
    max-width: 900px; line-height: 1.35;
  }
  .foot {
    position: absolute; bottom: 46px; left: 80px;
    display: flex; align-items: center; gap: 14px;
    font-size: 26px; font-weight: 800; letter-spacing: 1px; color: #ceff00;
  }
  .dot { width: 14px; height: 14px; border-radius: 50%; background: #ceff00; box-shadow: 0 0 14px #ceff00; }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="wrap">
    <div class="top">
      <div class="mark"></div>
      <div class="brand">CANLI<span>TV</span></div>
    </div>
    <h1>TÜRKİYE'NİN<br />TÜM KANALLARI<span class="a">.</span></h1>
    <div class="sub">Haber, spor, ulusal, çocuk ve müzik kanalları — hepsi tek ekranda, canlı.</div>
  </div>
  <div class="foot"><span class="dot"></span> canlitvkanallari.site</div>
</body>
</html>
